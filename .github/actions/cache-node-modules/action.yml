name: Cache node_modules
description: Restore cached Bun workspace dependencies.

runs:
  using: composite
  steps:
    - name: Cache node_modules
      uses: actions/cache@v5.0.5
      with:
        # Dependencies only. ttsc plugin/GOCACHE live under $TTSC_CACHE_DIR
        # (.cache/ttsc), not inside node_modules.
        # v2: hash tooling/typescript-api/** and isolate restore-keys from pre-shim Darwin caches.
        path: node_modules
        # prettier-ignore
        key: ${{ runner.os }}-${{ runner.arch }}-node-v2-${{ hashFiles('bun.lock', 'package.json', 'packages/*/package.json', 'tooling/typescript-api/**') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-node-v2-
