name: Cache node_modules
description: Restore cached Bun workspace dependencies.

runs:
  using: composite
  steps:
    - name: Cache node_modules
      uses: actions/cache@v5.0.5
      with:
        path: node_modules
        # prettier-ignore
        key: ${{ runner.os }}-${{ runner.arch }}-node-${{ hashFiles('bun.lock', 'package.json', 'packages/*/package.json') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-node-
