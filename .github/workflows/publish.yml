name: Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        type: choice
        description:
          Use auto for conventional commits, or force a semver bump. Prerelease publishes to next; all others publish to
          latest.
        options: [auto, patch, minor, major, prerelease]
        default: auto
      dry_run:
        type: boolean
        description: Run release commands without writing versions, tags, publishes, or GitHub Releases.
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: tooling/direnv

jobs:
  linux-release-candidate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: none
    outputs:
      mode: ${{ steps.version.outputs.mode }}
      release-sha: ${{ steps.release-state.outputs.sha }}
    env:
      NIX_STORE_NAR: ${{ github.workspace }}/nix-store.nar
      GH_TOKEN: ${{ github.token }}
    steps:
      # --- Setup --------------------------------------------------------------

      # Step 1: GitHub adds "Set up job" automatically
      # Step 2
      - name: 📥 Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.sha }}
          filter: blob:none
          fetch-depth: 0

      # Step 3. Composite action internals do not affect top-level job step
      # anchors; update these comments if top-level steps move.
      - name: 🧱 Setup Nix/devenv
        id: setup
        uses: ./.github/actions/setup-devenv

      # Step 4
      - name: 🤖 Configure release author
        run:
          git config user.name "github-actions[bot]" && git config user.email
          "41898282+github-actions[bot]@users.noreply.github.com"

      # Step 5
      - name: 🏗️ Build self-hosted smoo
        # SmoothBricks self-hosts smoo from source for release commands.
        run: nx build cli

      # Step 6
      - name: 🏷️ Version release
        id: version
        run:
          smoo release version --bump "${{ inputs.bump }}" --dry-run "${{ inputs.dry_run }}" --github-output
          "$GITHUB_OUTPUT"

      # Step 7
      - name: 🔒 Capture candidate release SHA
        id: release-state
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # --- Validation ---------------------------------------------------------

      # Release validation intentionally does not restore persisted Nx task
      # cache. Nx may reuse tasks produced earlier in this same job, but publish
      # never relies on task outputs restored from CI cache. version runs before
      # validation so the commit completed below is the commit that was checked.

      # Step 8
      - name: ✅ Check managed monorepo files (${{ steps.version.outputs.mode }})
        if: ${{ steps.version.outputs.mode != 'none' }}
        run: smoo monorepo check

      # Step 9
      - name: 🔨 Build (${{ steps.version.outputs.mode }})
        if: ${{ steps.version.outputs.mode != 'none' }}
        run:
          smoo github-ci nx-run-many --targets build --projects "${{ steps.version.outputs.projects }}"
          --collect-outputs "${{ runner.temp }}/release-build-outputs"

      # Step 10
      - name: 🐧 Build supplemental Linux targets
        if: ${{ steps.version.outputs.mode != 'none' }}
        run:
          smoo github-ci nx-run-many --targets "*-linux" --projects "${{ steps.version.outputs.projects }}"
          --collect-outputs "${{ runner.temp }}/linux-platform-outputs"

      # Step 11
      - name: 🔍 Lint (${{ steps.version.outputs.mode }})
        if: ${{ steps.version.outputs.mode != 'none' }}
        run: smoo github-ci nx-run-many --targets lint --projects "${{ steps.version.outputs.projects }}"

      # Step 12
      - name: 🧪 Unit Tests (${{ steps.version.outputs.mode }})
        if: ${{ steps.version.outputs.mode != 'none' }}
        run: smoo github-ci nx-run-many --targets test --projects "${{ steps.version.outputs.projects }}"

      # Step 13
      - name: 📎 Upload trace DBs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: trace-results-${{ github.run_id }}
          path: packages/*/.trace-results.db
          if-no-files-found: ignore
          retention-days: 14
          include-hidden-files: true

      # Step 14
      - name: ✅ Validate monorepo config (${{ steps.version.outputs.mode }})
        if: ${{ steps.version.outputs.mode != 'none' }}
        run: smoo monorepo validate

      # --- Candidate transfer --------------------------------------------------

      # Step 15
      - name: 📦 Bundle validated release state
        run:
          mkdir -p "${{ runner.temp }}/publish-release-state" && git bundle create "${{ runner.temp
          }}/publish-release-state/release-state.bundle" HEAD --tags && git rev-parse HEAD > "${{ runner.temp
          }}/publish-release-state/release-head"

      # Step 16
      - name: 📤 Upload validated release state
        uses: actions/upload-artifact@v7.0.1
        with:
          name: publish-release-state-${{ github.run_id }}
          path: ${{ runner.temp }}/publish-release-state
          if-no-files-found: error
          retention-days: 1

      # Step 17
      - name: 📤 Upload validated build outputs
        if: ${{ steps.version.outputs.mode != 'none' }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: publish-release-outputs-${{ github.run_id }}
          path: ${{ runner.temp }}/release-build-outputs
          if-no-files-found: error
          retention-days: 1

      # Step 18
      - name: 📤 Upload supplemental Linux outputs
        if: ${{ steps.version.outputs.mode != 'none' }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: publish-linux-outputs-${{ github.run_id }}
          path: ${{ runner.temp }}/linux-platform-outputs
          if-no-files-found: error
          retention-days: 1

      # --- Cleanup ------------------------------------------------------------

      # Step 19
      - name: 🧹 Cleanup and cache Nix/devenv
        if: ${{ always() }}
        uses: ./.github/actions/save-nix-devenv
        with:
          nix-cache-hit: ${{ steps.setup.outputs.nix-cache-hit }}
          devenv-cache-hit: ${{ steps.setup.outputs.devenv-cache-hit }}

  macos-platform:
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: none
    env:
      NIX_STORE_NAR: ${{ github.workspace }}/nix-store.nar
      GH_TOKEN: ${{ github.token }}
    steps:
      # --- Setup --------------------------------------------------------------

      # Step 1: GitHub adds "Set up job" automatically
      # Step 2
      - name: 📥 Checkout dispatch commit
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.sha }}
          filter: blob:none
          fetch-depth: 0

      # Step 3. Composite action internals do not affect top-level job step
      # anchors; update these comments if top-level steps move.
      - name: 🧱 Setup Nix/devenv
        id: setup
        uses: ./.github/actions/setup-devenv

      # Step 4
      - name: 🏗️ Build self-hosted smoo
        # SmoothBricks self-hosts smoo from source for release commands.
        run: nx build cli

      # Step 5
      - name: 🍎 Build current macOS and iOS targets
        run:
          smoo github-ci nx-run-many --targets "*-macos,*-ios" --collect-outputs "${{ runner.temp
          }}/macos-platform-outputs/current"

      # Step 6
      - name: 🧯 Build pending release macOS and iOS targets
        run:
          smoo release build-repair-platform-outputs --ref "${{ github.sha }}" --targets "*-macos,*-ios" --output "${{
          runner.temp }}/macos-platform-outputs/repairs"

      # Step 7
      - name: 📤 Upload macOS platform outputs
        uses: actions/upload-artifact@v7.0.1
        with:
          name: publish-macos-outputs-${{ github.run_id }}
          path: ${{ runner.temp }}/macos-platform-outputs
          if-no-files-found: error
          retention-days: 1

      # --- Cleanup ------------------------------------------------------------

      # Step 8
      - name: 🧹 Cleanup and cache Nix/devenv
        if: ${{ always() }}
        uses: ./.github/actions/save-nix-devenv
        with:
          nix-cache-hit: ${{ steps.setup.outputs.nix-cache-hit }}
          devenv-cache-hit: ${{ steps.setup.outputs.devenv-cache-hit }}

  publish-on-linux:
    needs: [linux-release-candidate, macos-platform]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      NIX_STORE_NAR: ${{ github.workspace }}/nix-store.nar
      GH_TOKEN: ${{ github.token }}
    steps:
      # --- Setup --------------------------------------------------------------

      # Step 1: GitHub adds "Set up job" automatically
      # Step 2
      - name: 📥 Checkout dispatch commit
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.sha }}
          filter: blob:none
          fetch-depth: 0

      # Step 3
      - name: 📥 Download candidate artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: publish-*-${{ github.run_id }}
          path: ${{ runner.temp }}/publish-artifacts
          merge-multiple: false

      # Step 4. Composite action internals do not affect top-level job step
      # anchors; update these comments if top-level steps move.
      - name: 🧱 Setup Nix/devenv
        id: setup
        uses: ./.github/actions/setup-devenv

      # Step 5
      - name: 🤖 Configure release author
        run:
          git config user.name "github-actions[bot]" && git config user.email
          "41898282+github-actions[bot]@users.noreply.github.com"

      # Step 6
      - name: 🏗️ Build self-hosted smoo
        # SmoothBricks self-hosts smoo from source for release commands.
        run: nx build cli

      # --- Repair -------------------------------------------------------------

      # Step 7
      - name: 🧯 Repair pending releases
        run:
          smoo release repair-pending --ref "${{ github.sha }}" --platform-outputs "${{ runner.temp
          }}/publish-artifacts/publish-macos-outputs-${{ github.run_id }}/repairs" --dry-run "${{ inputs.dry_run }}"

      # Step 8
      - name: ♻️ Restore validated release state
        run:
          git fetch "${{ runner.temp }}/publish-artifacts/publish-release-state-${{ github.run_id
          }}/release-state.bundle" HEAD --tags && git reset --hard "$(cat "${{ runner.temp
          }}/publish-artifacts/publish-release-state-${{ github.run_id }}/release-head")"

      # --- Validation ---------------------------------------------------------

      # Step 9
      - name: 📦 Apply verified Linux outputs
        if: ${{ needs.linux-release-candidate.outputs.mode != 'none' }}
        run:
          smoo github-ci apply-outputs --source-sha "${{ needs.linux-release-candidate.outputs.release-sha }}" "${{
          runner.temp }}/publish-artifacts/publish-release-outputs-${{ github.run_id }}" "${{ runner.temp
          }}/publish-artifacts/publish-linux-outputs-${{ github.run_id }}"

      # Step 10
      - name: 🍎 Apply verified macOS outputs
        if: ${{ needs.linux-release-candidate.outputs.mode != 'none' }}
        run:
          smoo github-ci apply-outputs --source-sha "${{ github.sha }}" "${{ runner.temp
          }}/publish-artifacts/publish-macos-outputs-${{ github.run_id }}/current"

      # Step 11
      - name: ✅ Validate restored release (${{ needs.linux-release-candidate.outputs.mode }})
        if: ${{ needs.linux-release-candidate.outputs.mode != 'none' }}
        run: smoo monorepo validate

      # --- Release ------------------------------------------------------------

      # Step 12
      - name: 📦 Publish release (${{ needs.linux-release-candidate.outputs.mode }})
        # smoo packs with Bun, then publishes tarballs with npm. Existing
        # packages must already exist on npm and use trusted publishing/OIDC.
        # Missing package names are bootstrapped locally before trust setup.
        run: smoo release publish --bump "${{ inputs.bump }}" --dry-run "${{ inputs.dry_run }}"

      # --- Cleanup ------------------------------------------------------------

      # Step 13
      - name: 🧹 Cleanup and cache Nix/devenv
        if: ${{ always() }}
        uses: ./.github/actions/save-nix-devenv
        with:
          nix-cache-hit: ${{ steps.setup.outputs.nix-cache-hit }}
          devenv-cache-hit: ${{ steps.setup.outputs.devenv-cache-hit }}
