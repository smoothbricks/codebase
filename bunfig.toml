[install]
linker = "hoisted"

[run]
preload = ["@smoothbricks/validation/bun/preload", "./packages/lmao/src/bun/preload.ts"]

[test]
# Keep Typia and test tracing as separate preloads so Typia is registered before
# the tracing preload imports any source files that call typia.createValidate*().
preload = ["@smoothbricks/validation/bun/preload", "./packages/lmao/src/bun/preload.ts", "./packages/lmao/src/bun/trace-preload.ts"]
