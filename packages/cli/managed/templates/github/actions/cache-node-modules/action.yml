name: Cache node_modules
description: Restore cached Bun workspace dependencies.

runs:
  using: composite
  steps:
    - name: Cache node_modules
      uses: actions/cache@v5
      with:
        path: node_modules
        key: ${{ runner.os }}-node-{{NODE_MODULES_CACHE_KEY}}
        restore-keys: |
          ${{ runner.os }}-node-
