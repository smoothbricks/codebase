name: Save Nix/devenv caches
description: Cleanup the Nix store and explicitly save Nix/devenv cache segments.

inputs:
  nix-cache-hit:
    description: Exact-hit output from setup-devenv's Nix cache restore.
    required: false
    default: 'false'
  devenv-cache-hit:
    description: Exact-hit output from setup-devenv's devenv cache restore.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: 🧹 Prepare Nix/devenv cache save
      id: cleanup-cache
      shell: bash
      working-directory: tooling/direnv
      env:
        NIX_CACHE_HIT: ${{ inputs.nix-cache-hit }}
      # An exact Nix cache hit is immutable and cannot be overwritten by
      # actions/cache. Avoid rebuilding its ~2 GB NAR just to discard it.
      # build-shell normally adds repo paths to GITHUB_PATH, but cleanup must
      # still run after a cache miss when build-shell fails before that happens.
      run: |
        if [[ "$NIX_CACHE_HIT" == 'true' ]]; then
          echo 'cache-ready=true' >> "$GITHUB_OUTPUT"
          exit 0
        fi
        export PATH="$(../../tooling/direnv/repo-path)"
        smoo github-ci cleanup-cache

    - name: 🧊 Save Nix profiles and store NAR
      if: ${{ steps.cleanup-cache.outputs.cache-ready == 'true' && inputs.nix-cache-hit != 'true' }}
      uses: ./.github/actions/cache-nix-devenv
      with:
        segment: nix
        mode: save

    - name: 🧊 Save devenv and direnv
      if: ${{ steps.cleanup-cache.outputs.cache-ready == 'true' && inputs.devenv-cache-hit != 'true' }}
      uses: ./.github/actions/cache-nix-devenv
      with:
        segment: devenv
        mode: save
