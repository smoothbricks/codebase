name: CI

on:
  push:
  pull_request:

permissions:
  actions: read
  contents: read
  statuses: write

defaults:
  run:
    working-directory: tooling/direnv

jobs:
  main:
    runs-on: ubuntu-latest
    env:
      NIX_STORE_NAR: ${{ github.workspace }}/nix-store.nar
      GH_TOKEN: ${{ github.token }}
    steps:
      # Step 1: GitHub adds "Set up job" automatically
      # Step 2
      - name: 📥 Checkout
        uses: ./.github/actions/checkout

      # --- Nix ----------------------------------------------------------------

      # Step 3
      - name: ❄️ Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            keep-outputs = true
            keep-derivations = true
            gc-keep-derivations = true
            gc-keep-outputs = true

      # Step 4
      # Cache Nix profiles, devenv and direnv
      - name: 🧊 Cache Nix profiles, devenv and direnv
        uses: ./.github/actions/cache-nix-devenv

      # Step 5
      - name: ♻️ Restore Nix store from NAR
        run: ./github-actions-bootstrap.sh restore-store

      # --- devenv shell -------------------------------------------------------

      # Step 6
      - name: ⚡ Enable Cachix
        uses: cachix/cachix-action@v16
        with:
          name: devenv

      # Step 7
      - name: 🧰 Install devenv
        run: ./github-actions-bootstrap.sh install-devenv

      # Step 8
      - name: 📦 Cache node_modules
        uses: ./.github/actions/cache-node-modules

      # Step 9
      - name: 🐚 Build devenv shell
        run: ./github-actions-bootstrap.sh build-shell

      # --- Nx -----------------------------------------------------------------

      # Step 10
      # Sets the base and head SHAs required for the nx affected commands
      - name: 🧭 Set Nx SHAs
        uses: nrwl/nx-set-shas@v4.4.0

      # Step 11
      - name: 🧠 Cache Nx
        uses: ./.github/actions/cache-nx

      # Step 12
      - name: 🔍 Lint
        run: smoo github-ci nx-smart --target lint --name "Lint" --step 12

      # Step 13
      - name: 🧪 Unit Tests
        run: smoo github-ci nx-smart --target test --name "Unit Tests" --step 13

      # Step 14
      - name: 🔨 Build
        run: smoo github-ci nx-smart --target build --name "Build" --step 14

      # --- Cleanup ------------------------------------------------------------

      - name: 🧹 Cleanup and cache Nix store
        run: smoo github-ci cleanup-cache
