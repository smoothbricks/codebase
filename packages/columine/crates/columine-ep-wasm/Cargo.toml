[package]
name = "columine-ep-wasm"
description = "columine's event_processor.wasm: the 6-function ep_* export surface over columine-event-processor with EpWiring::columine() (caller-buffer protocol, no dedup)"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true

[lib]
# cdylib for the wasm artifact; rlib so the extern layer is testable natively.
crate-type = ["cdylib", "rlib"]

[dependencies]
columine-event-processor = { path = "../columine-event-processor" }
columine-arrow = { path = "../columine-arrow" }

[dev-dependencies]
arrow-array = { workspace = true }
arrow-ipc = { workspace = true }
arrow-schema = { workspace = true }
