[workspace]
resolver = "3"
members = [
  "crates/cowshed-core",
  "crates/cowshed-cli",
  "crates/cowshed-gateway",
  "crates/cowshed-napi",
  "crates/cowshed-escape-tests",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
publish = false

[workspace.dependencies]
cowshed-core = { path = "crates/cowshed-core" }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
