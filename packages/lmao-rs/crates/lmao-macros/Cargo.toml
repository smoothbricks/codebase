[package]
name = "lmao-macros"
description = "Proc-macros replacing the TS runtime codegen: define_log_schema! / span!"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
proc-macro = true

[dependencies]
syn = { version = "2", features = ["full"] }
quote = "1"
proc-macro2 = "1"

[dev-dependencies]
trybuild = "1"
lmao-core = { workspace = true }
