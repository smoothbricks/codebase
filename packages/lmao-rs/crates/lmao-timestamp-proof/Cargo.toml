[package]
name = "lmao-timestamp-proof"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true
description = "span_start.{wasm,node} — LMAO timestamp-accuracy proof instrumentation (ports AxE's timestamp_proof_{layout,wasm,napi}.zig; consumer: AxE proofs/timestamp-accuracy.proof.ts). Retired into lmao-rs per the AxE port dossier §5.4: this is LMAO proof machinery, not runtime."

[lib]
crate-type = ["cdylib", "rlib"]

[features]
# The .node artifact: napi-rs registration compiles only when requested so
# the wasm build stays dependency-free.
napi = ["dep:napi", "dep:napi-derive", "dep:napi-build"]

[dependencies]
napi = { version = "2", default-features = false, features = ["napi6"], optional = true }
napi-derive = { version = "2", optional = true }

[build-dependencies]
napi-build = { version = "2", optional = true }

[dev-dependencies]
proptest = { workspace = true }
