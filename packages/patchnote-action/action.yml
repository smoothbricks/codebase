name: 'patchnote Action'
description: 'Run patchnote in GitHub Actions using the smoothbricks monorepo subpath action'
author: 'smoothbricks'

inputs:
  config-path:
    description: 'Path to a patchnote config file relative to the repository root'
    required: false
    default: ''
  dry-run:
    description: 'Run patchnote without creating branches, commits, or PRs'
    required: false
    default: 'false'
  skip-ai:
    description: 'Skip AI changelog analysis'
    required: false
    default: 'false'
  token:
    description: 'GitHub token for gh CLI operations; falls back to github.token when omitted'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ inputs.token || github.token }}

    - name: Install Nix
      if: ${{ hashFiles('**/devenv.yaml') != '' }}
      uses: DeterminateSystems/nix-installer-action@main

    - name: Setup Nix cache
      if: ${{ hashFiles('**/devenv.yaml') != '' }}
      uses: DeterminateSystems/magic-nix-cache-action@main

    - name: Install devenv and nvfetcher
      if: ${{ hashFiles('**/devenv.yaml') != '' }}
      shell: bash
      run: nix profile install nixpkgs#devenv nixpkgs#nvfetcher

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Configure git
      shell: bash
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Install action dependencies
      shell: bash
      env:
        ACTION_REPO_ROOT: ${{ github.action_path }}/../..
      run: bun install --cwd "$ACTION_REPO_ROOT" --frozen-lockfile

    - name: Build local patchnote CLI
      shell: bash
      env:
        ACTION_REPO_ROOT: ${{ github.action_path }}/../..
      run: bun run --cwd "$ACTION_REPO_ROOT/packages/patchnote" build

    - name: Run patchnote
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token || github.token }}
        ACTION_REPO_ROOT: ${{ github.action_path }}/../..
      run: |
        set -euo pipefail

        args=(update-deps --verbose)

        if [[ "${{ inputs.dry-run }}" == 'true' ]]; then
          args+=(--dry-run)
        fi

        if [[ "${{ inputs.skip-ai }}" == 'true' ]]; then
          args+=(--skip-ai)
        fi

        if [[ -n "${{ inputs.config-path }}" ]]; then
          args+=(--config-path "${{ inputs.config-path }}")
        fi

        node "$ACTION_REPO_ROOT/packages/patchnote/dist/cli.js" "${args[@]}"

branding:
  icon: 'git-pull-request'
  color: 'blue'
